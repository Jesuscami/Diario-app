<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diario IA Emocional</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2c5364">

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <h1>🧠 Diario IA Emocional</h1>

  <input type="email" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña">

  <button onclick="login()">Entrar</button>
  <button onclick="register()">Registrarse</button>

  <hr>

  <button onclick="loginGoogle()">🔵 Entrar con Google</button>
</div>

<!-- 📱 APP -->
<div id="app" class="hidden">

  <h1>📓 Mi Diario</h1>
  <button onclick="logout()">🚪 Salir</button>

  <textarea id="texto" placeholder="¿Cómo te sientes hoy?"></textarea>
  <button onclick="guardar()">Guardar</button>

  <p id="iaResult">IA analizando...</p>

  <h2>📄 Reflexiones</h2>
  <div id="lista"></div>

  <h2>📊 Semana emocional</h2>
  <canvas id="graficaSemana"></canvas>
  <p id="analisisSemana"></p>

</div>

<script src="Script.js"></script>

</body>
</html>
