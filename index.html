<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <title>Diario Salud Mental</title>

  <link rel="stylesheet" href="styles.css">

  <!-- 📊 Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app">

  <h1>📓 Diario Inteligente</h1>

  <!-- 🧠 INPUT -->
  <textarea id="texto" placeholder="¿Cómo te sientes hoy?"></textarea>
  <button onclick="guardar()">Guardar reflexión</button>

  <!-- 🧠 IA RESULTADO -->
  <h2>🤖 Estado emocional</h2>
  <p id="iaResult">Escribe algo...</p>

  <!-- 📊 GRÁFICA SEMANAL -->
  <h2>📊 Estado emocional semanal</h2>
  <canvas id="graficaSemana"></canvas>

  <!-- 🧠 ANÁLISIS -->
  <h2>🧠 Análisis de salud mental</h2>
  <p id="analisisSemana"></p>

  <!-- 📓 LISTA -->
  <h2>🧾 Reflexiones</h2>
  <div id="lista"></div>

</div>

<script src="Script.js"></script>

</body>
</html>
